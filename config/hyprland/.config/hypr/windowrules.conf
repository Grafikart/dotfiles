# Window Rules (adapted to new syntax)

# Wofi
windowrule = match:class ^(wofi)$, float on

# Force windows on specific workspaces
windowrule = match:class ^(Code|PHPStorm)$, workspace 1
windowrule = match:class ^(discord)$, workspace 5
windowrule = match:title ^(Spotify|YouTube Music).*$, workspace 8
windowrule = match:title ^(Spotify|YouTube Music).*$, tile on
windowrule = match:class .*, suppress_event maximize

# Improve JetBrains popups (floating only)
windowrule = match:class ^.*(jetbrains).*$, match:float 1, max_size 2400 1400
windowrule = match:class ^.*(jetbrains).*$, match:float 1, min_size 400 800
windowrule = match:class ^.*(jetbrains).*$, match:float 1, border_size 0

# Improve file picker popups
windowrule = match:class ^(pcmanfm|Thunar|thunar)$, match:float 1, max_size 1150 650
windowrule = match:class ^Xdg-desktop-portal-gtk$, match:float 1, tag filepicker
windowrule = match:tag filepicker, min_size 1000 700
windowrule = match:tag filepicker, border_size 0
windowrule = match:tag filepicker, no_shadow on
windowrule = match:title ^(SpeedCrunch)$, max_size 950 560

# Floating windows
windowrule = match:class ^(pcmanfm|Thunar)$, float on
windowrule = match:title ^(SpeedCrunch)$, float on
windowrule = match:title ^(Open)$, float on
windowrule = match:title ^(Choose Files)$, float on
windowrule = match:title ^(Save As)$, float on
windowrule = match:title ^(Confirm to replace files)$, float on
windowrule = match:title ^(File Operation Progress)$, float on
windowrule = match:class ^(xdg-desktop-portal-gtk)$, float on

# Picture-in-picture
windowrule = match:initial_title ^(Mode PIP).*$, no_max_size on
windowrule = match:initial_title ^(Mode PIP).*$, min_size 800 600
